name: release-npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Linux binary
        run: cargo build --release --locked
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wirecli-linux-x64
          path: target/release/wirecli

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows binary
        run: cargo build --release --locked
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wirecli-win32-x64
          path: target/release/wirecli.exe

  publish:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: wirecli-linux-x64
          path: .artifacts/linux-x64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: wirecli-win32-x64
          path: .artifacts/win32-x64
      - name: Stage platform binaries
        run: |
          node scripts/stage-platform-binary.mjs linux-x64 .artifacts/linux-x64/wirecli
          node scripts/stage-platform-binary.mjs win32-x64 .artifacts/win32-x64/wirecli.exe
      - name: Validate platform packages
        run: node scripts/check-platform-packages.mjs
      - name: Publish Linux package
        run: npm publish ./packages/linux-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish Windows package
        run: npm publish ./packages/win32-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish root package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
