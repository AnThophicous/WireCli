name: release-npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Linux binary
        run: cargo build --release --locked
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: wirecli-linux-x64
          path: target/release/wirecli

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Windows binary
        run: cargo build --release --locked
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: wirecli-win32-x64
          path: target/release/wirecli.exe

  publish:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: wirecli-linux-x64
          path: .artifacts/linux-x64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: wirecli-win32-x64
          path: .artifacts/win32-x64
      - name: Publish GitHub release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Wire CLI ${tag}" --notes "Pre-Beta Releasing Version ${version}"
          fi
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" --clobber \
            ".artifacts/linux-x64/wirecli#wirecli-linux-x64" \
            ".artifacts/win32-x64/wirecli.exe#wirecli-win32-x64.exe"
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if npm view "wirecli@${version}" version >/dev/null 2>&1; then
            echo "wirecli@${version} is already published"
            exit 0
          fi
          npm publish --access public
